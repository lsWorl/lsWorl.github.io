<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Boosting 串行修正流程</title>
  <desc id="desc">Boosting 中后一个模型关注前一个模型的错误，并把多个模型加权累加。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#44546a"/>
    </marker>
    <style>
      .txt { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #243447; font-size: 17px; }
      .title { font-size: 22px; font-weight: 700; }
      .small { font-size: 14px; fill: #526173; }
      .box { fill: #fff; stroke: #d7dee8; stroke-width: 2; rx: 8; }
      .model { fill: #fff4df; stroke: #d18a1f; stroke-width: 2; rx: 8; }
      .error { fill: #ffecef; stroke: #c44d63; stroke-width: 2; rx: 8; }
      .final { fill: #eaf7ef; stroke: #3f8f5f; stroke-width: 2; rx: 8; }
      .line { stroke: #44546a; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="900" height="430" fill="#f7fafc"/>
  <text class="txt title" x="36" y="44">Boosting：后一轮模型重点修正前一轮错误</text>
  <text class="txt small" x="36" y="72">模型按顺序训练，最终结果是多个弱模型的加权累加。</text>

  <rect class="box" x="42" y="174" width="120" height="78"/>
  <text class="txt" x="72" y="207">数据 D</text>
  <text class="txt small" x="62" y="232">初始权重相同</text>
  <path class="line" d="M170 213 L232 213"/>

  <rect class="model" x="234" y="174" width="126" height="78"/>
  <text class="txt" x="264" y="207">模型 h1</text>
  <text class="txt small" x="266" y="232">先学一轮</text>
  <path class="line" d="M368 213 L430 213"/>

  <rect class="error" x="432" y="174" width="126" height="78"/>
  <text class="txt" x="456" y="207">错误样本</text>
  <text class="txt small" x="460" y="232">权重变大</text>
  <path class="line" d="M566 213 L628 213"/>

  <rect class="model" x="630" y="174" width="126" height="78"/>
  <text class="txt" x="660" y="207">模型 h2</text>
  <text class="txt small" x="654" y="232">重点补错</text>
  <path class="line" d="M692 164 C692 122, 494 112, 494 164"/>
  <text class="txt small" x="470" y="110">继续更新权重或残差</text>

  <path class="line" d="M758 213 L810 213"/>
  <rect class="final" x="812" y="174" width="60" height="78"/>
  <text class="txt" x="828" y="207">F</text>
  <text class="txt small" x="822" y="232">累加</text>

  <text class="txt" x="210" y="324">最终模型：</text>
  <text class="txt" x="300" y="324">F(x) = α1h1(x) + α2h2(x) + ... + αThT(x)</text>
</svg>
