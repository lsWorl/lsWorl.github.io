<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
  <title id="title">GNN training pipeline</title>
  <desc id="desc">A GNN training pipeline builds graph data, runs message passing layers, computes predictions, evaluates loss, and updates parameters.</desc>
  <rect width="900" height="480" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Typical GNN Training Pipeline</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The graph structure stays in the forward pass, not only in preprocessing.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="45" y="205" width="135" height="78" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="113" y="236" font-size="18" font-weight="700" fill="#222831">Graph Data</text>
    <text x="113" y="261" font-size="15" fill="#5f6b7a">X, edge_index</text>
    <rect x="230" y="205" width="145" height="78" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
    <text x="303" y="236" font-size="18" font-weight="700" fill="#222831">GNN Layers</text>
    <text x="303" y="261" font-size="15" fill="#5f6b7a">message passing</text>
    <rect x="425" y="205" width="135" height="78" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
    <text x="493" y="236" font-size="18" font-weight="700" fill="#222831">Prediction</text>
    <text x="493" y="261" font-size="15" fill="#5f6b7a">node / edge / graph</text>
    <rect x="610" y="205" width="110" height="78" rx="8" fill="#fff0f0" stroke="#eb5757" stroke-width="2"/>
    <text x="665" y="236" font-size="18" font-weight="700" fill="#222831">Loss</text>
    <text x="665" y="261" font-size="15" fill="#5f6b7a">CE / MSE</text>
    <rect x="770" y="205" width="95" height="78" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
    <text x="818" y="236" font-size="18" font-weight="700" fill="#222831">Update</text>
    <text x="818" y="261" font-size="15" fill="#5f6b7a">Adam</text>
  </g>
  <g stroke="#566070" stroke-width="3" marker-end="url(#arrow)">
    <line x1="180" y1="244" x2="230" y2="244"/>
    <line x1="375" y1="244" x2="425" y2="244"/>
    <line x1="560" y1="244" x2="610" y2="244"/>
    <line x1="720" y1="244" x2="770" y2="244"/>
  </g>
  <path d="M818 283 C770 390 300 390 303 283" stroke="#566070" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="435" y="405" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#566070">backprop through graph layers</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
