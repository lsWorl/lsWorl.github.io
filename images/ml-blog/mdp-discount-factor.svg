<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Discount factor</title>
  <desc id="desc">Future rewards are multiplied by powers of gamma, so smaller gamma values reduce distant rewards more strongly.</desc>
  <rect width="900" height="460" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Discount Factor gamma</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Distant rewards count less when gamma is smaller.</text>
  <line x1="110" y1="330" x2="790" y2="330" stroke="#c8d0da" stroke-width="2"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="160" cy="260" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="160" y="266" font-size="18" font-weight="700" fill="#222831">R1</text>
    <text x="160" y="354" font-size="16" fill="#5f6b7a">1</text>
    <circle cx="320" cy="260" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2" opacity="0.86"/>
    <text x="320" y="266" font-size="18" font-weight="700" fill="#222831">R2</text>
    <text x="320" y="354" font-size="16" fill="#5f6b7a">gamma</text>
    <circle cx="480" cy="260" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2" opacity="0.66"/>
    <text x="480" y="266" font-size="18" font-weight="700" fill="#222831">R3</text>
    <text x="480" y="354" font-size="16" fill="#5f6b7a">gamma^2</text>
    <circle cx="640" cy="260" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2" opacity="0.44"/>
    <text x="640" y="266" font-size="18" font-weight="700" fill="#222831">R4</text>
    <text x="640" y="354" font-size="16" fill="#5f6b7a">gamma^3</text>
  </g>
  <text x="230" y="165" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">G_t = R1 + gamma R2 + gamma^2 R3 + ...</text>
</svg>
