<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">PyTorch neural network components</title>
  <desc id="desc">Common PyTorch neural network components include tensors, modules, losses, optimizers, dataloaders, and train eval modes.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Common PyTorch Neural Network Components</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">A model is more than layers: data, loss, gradients, and optimization all work together.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="80" y="145" width="190" height="82" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="175" y="178" font-size="20" font-weight="700" fill="#222831">Tensor</text>
    <text x="175" y="204" font-size="15" fill="#5f6b7a">data + grad flag</text>
    <rect x="355" y="145" width="190" height="82" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
    <text x="450" y="178" font-size="20" font-weight="700" fill="#222831">nn.Module</text>
    <text x="450" y="204" font-size="15" fill="#5f6b7a">layers + forward</text>
    <rect x="630" y="145" width="190" height="82" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
    <text x="725" y="178" font-size="20" font-weight="700" fill="#222831">Loss</text>
    <text x="725" y="204" font-size="15" fill="#5f6b7a">training objective</text>
    <rect x="80" y="300" width="190" height="82" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
    <text x="175" y="333" font-size="20" font-weight="700" fill="#222831">Autograd</text>
    <text x="175" y="359" font-size="15" fill="#5f6b7a">chain rule</text>
    <rect x="355" y="300" width="190" height="82" rx="8" fill="#fff0f0" stroke="#eb5757" stroke-width="2"/>
    <text x="450" y="333" font-size="20" font-weight="700" fill="#222831">Optimizer</text>
    <text x="450" y="359" font-size="15" fill="#5f6b7a">update params</text>
    <rect x="630" y="300" width="190" height="82" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
    <text x="725" y="333" font-size="20" font-weight="700" fill="#222831">DataLoader</text>
    <text x="725" y="359" font-size="15" fill="#5f6b7a">mini-batches</text>
  </g>
  <path d="M270 186 L355 186" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M545 186 L630 186" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M725 227 C725 420 175 420 175 382" stroke="#566070" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M270 341 L355 341" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
