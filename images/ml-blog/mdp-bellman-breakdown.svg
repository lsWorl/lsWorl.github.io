<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Bellman equation intuition</title>
  <desc id="desc">The Bellman equation decomposes long-term value into immediate reward and discounted future value.</desc>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Bellman Equation Intuition</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Infinite future becomes one step plus the rest.</text>
  <rect x="86" y="190" width="180" height="86" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="126" y="242" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222831">V(s)</text>
  <text x="300" y="244" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#566070">=</text>
  <rect x="360" y="160" width="180" height="86" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
  <text x="404" y="212" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#222831">reward</text>
  <text x="565" y="214" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#566070">+</text>
  <rect x="620" y="160" width="210" height="86" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
  <text x="653" y="212" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#222831">gamma V(s')</text>
  <path d="M450 246 C450 310 190 310 176 276" stroke="#f2994a" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M725 246 C725 360 190 360 176 276" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="214" y="383" font-family="Arial, sans-serif" font-size="18" fill="#5f6b7a">Current value is computed from immediate feedback and future value.</text>
  <defs>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f2994a"/></marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/></marker>
  </defs>
</svg>
