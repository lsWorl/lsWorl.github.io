<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">HEFT schedule Gantt chart</title>
  <desc id="desc">A Gantt chart showing a possible HEFT schedule across two processors.</desc>
  <rect width="900" height="430" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">A HEFT Schedule Looks Like a Gantt Chart</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The final objective is usually to minimize makespan.</text>
  <line x1="120" y1="325" x2="800" y2="325" stroke="#c8d0da" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="70" y="176" font-size="19" font-weight="700" fill="#222831">P1</text>
    <text x="70" y="266" font-size="19" font-weight="700" fill="#222831">P2</text>
    <rect x="135" y="145" width="140" height="52" rx="6" fill="#eaf3ff" stroke="#2f80ed"/>
    <text x="190" y="178" font-size="18" font-weight="700" fill="#222831">T1</text>
    <rect x="310" y="145" width="150" height="52" rx="6" fill="#fff8e8" stroke="#f2994a"/>
    <text x="365" y="178" font-size="18" font-weight="700" fill="#222831">T2</text>
    <rect x="520" y="145" width="160" height="52" rx="6" fill="#f0fff4" stroke="#27ae60"/>
    <text x="580" y="178" font-size="18" font-weight="700" fill="#222831">T4</text>
    <rect x="245" y="235" width="170" height="52" rx="6" fill="#f7f3ff" stroke="#9b51e0"/>
    <text x="310" y="268" font-size="18" font-weight="700" fill="#222831">T3</text>
    <text x="120" y="354" font-size="15" fill="#5f6b7a">0</text>
    <text x="270" y="354" font-size="15" fill="#5f6b7a">4</text>
    <text x="455" y="354" font-size="15" fill="#5f6b7a">8</text>
    <text x="675" y="354" font-size="15" fill="#5f6b7a">13</text>
    <path d="M680 198 L680 324" stroke="#eb5757" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="642" y="386" font-size="18" font-weight="700" fill="#c0392b">makespan</text>
  </g>
</svg>
