<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Graph attention network</title>
  <desc id="desc">A graph attention layer assigns different weights to different neighboring nodes.</desc>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">GAT: Not Every Neighbor Is Equally Important</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Attention weights let the model learn which neighbors matter more.</text>
  <g stroke-linecap="round">
    <line x1="450" y1="240" x2="255" y2="160" stroke="#2f80ed" stroke-width="9"/>
    <line x1="450" y1="240" x2="255" y2="320" stroke="#f2994a" stroke-width="4"/>
    <line x1="450" y1="240" x2="650" y2="160" stroke="#27ae60" stroke-width="6"/>
    <line x1="450" y1="240" x2="650" y2="320" stroke="#eb5757" stroke-width="3"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="450" cy="240" r="55" fill="#f7f3ff" stroke="#9b51e0" stroke-width="4"/>
    <text x="450" y="247" font-size="22" font-weight="700" fill="#222831">center</text>
    <circle cx="245" cy="155" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <text x="245" y="162" font-size="18" font-weight="700" fill="#222831">n1</text>
    <circle cx="245" cy="325" r="38" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <text x="245" y="332" font-size="18" font-weight="700" fill="#222831">n2</text>
    <circle cx="660" cy="155" r="38" fill="#f0fff4" stroke="#27ae60" stroke-width="3"/>
    <text x="660" y="162" font-size="18" font-weight="700" fill="#222831">n3</text>
    <circle cx="660" cy="325" r="38" fill="#fff0f0" stroke="#eb5757" stroke-width="3"/>
    <text x="660" y="332" font-size="18" font-weight="700" fill="#222831">n4</text>
  </g>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2f80ed">alpha=0.45</text>
  <text x="300" y="335" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#f2994a">alpha=0.15</text>
  <text x="545" y="150" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#27ae60">alpha=0.30</text>
  <text x="545" y="335" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#eb5757">alpha=0.10</text>
</svg>
