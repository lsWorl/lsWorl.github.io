<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">HEFT upward rank</title>
  <desc id="desc">Upward rank estimates the longest average-cost path from a task to the exit task.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Upward Rank Measures Distance to the End</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">A task is important if it lies on a long and expensive path to the exit task.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="170" cy="235" r="38" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <text x="170" y="231" font-size="19" font-weight="700" fill="#222831">T1</text>
    <text x="170" y="257" font-size="15" fill="#2f80ed">rank 18</text>
    <circle cx="350" cy="165" r="38" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <text x="350" y="161" font-size="19" font-weight="700" fill="#222831">T2</text>
    <text x="350" y="187" font-size="15" fill="#9b6500">rank 11</text>
    <circle cx="350" cy="310" r="38" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <text x="350" y="306" font-size="19" font-weight="700" fill="#222831">T3</text>
    <text x="350" y="332" font-size="15" fill="#9b6500">rank 9</text>
    <circle cx="555" cy="235" r="38" fill="#f0fff4" stroke="#27ae60" stroke-width="3"/>
    <text x="555" y="231" font-size="19" font-weight="700" fill="#222831">T4</text>
    <text x="555" y="257" font-size="15" fill="#1f8f4d">rank 4</text>
  </g>
  <path d="M207 221 L314 179" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M207 249 L314 296" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 177 L519 221" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 298 L519 249" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="640" y="150" width="220" height="170" rx="8" fill="#ffffff" stroke="#d4dbe5"/>
  <text x="670" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#222831">Formula</text>
  <text x="670" y="228" font-family="Arial, sans-serif" font-size="16" fill="#222831">rank_u(i) = avg_w(i)</text>
  <text x="670" y="256" font-family="Arial, sans-serif" font-size="16" fill="#222831">+ max child</text>
  <text x="695" y="284" font-family="Arial, sans-serif" font-size="16" fill="#222831">(avg_c + rank_u(child))</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
