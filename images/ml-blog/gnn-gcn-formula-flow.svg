<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">GCN formula flow</title>
  <desc id="desc">A GCN layer normalizes adjacency, aggregates node features, applies a weight matrix, and uses an activation function.</desc>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">GCN Layer: Normalize, Aggregate, Transform</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">A common GCN layer can be understood as a matrix form of neighbor averaging.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="75" y="200" width="145" height="74" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="148" y="232" font-size="20" font-weight="700" fill="#222831">X</text>
    <text x="148" y="257" font-size="15" fill="#5f6b7a">node features</text>
    <rect x="285" y="200" width="160" height="74" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
    <text x="365" y="232" font-size="20" font-weight="700" fill="#222831">A + I</text>
    <text x="365" y="257" font-size="15" fill="#5f6b7a">self loops</text>
    <rect x="510" y="200" width="160" height="74" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
    <text x="590" y="232" font-size="20" font-weight="700" fill="#222831">D^-1/2 A D^-1/2</text>
    <text x="590" y="257" font-size="15" fill="#5f6b7a">normalize</text>
    <rect x="735" y="200" width="105" height="74" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
    <text x="788" y="232" font-size="20" font-weight="700" fill="#222831">H'</text>
    <text x="788" y="257" font-size="15" fill="#5f6b7a">new emb</text>
  </g>
  <path d="M220 237 L285 237" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M445 237 L510 237" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M670 237 L735 237" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="190" y="350" width="520" height="50" rx="8" fill="#ffffff" stroke="#d4dbe5"/>
  <text x="233" y="382" font-family="Arial, sans-serif" font-size="18" fill="#222831">H^{l+1} = sigma( D^-1/2 A_hat D^-1/2 H^l W^l )</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
