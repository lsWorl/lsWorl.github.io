<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">PPO actor critic and advantage estimation</title>
  <desc id="desc">PPO commonly uses an actor network for action probabilities and a critic network for value estimation, then computes advantages.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Actor-Critic Structure in PPO</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The actor chooses actions, the critic estimates values, and advantages guide policy updates.</text>
  <rect x="88" y="195" width="145" height="78" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
  <text x="132" y="226" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">State</text>
  <text x="151" y="252" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">s</text>
  <rect x="330" y="130" width="190" height="82" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
  <text x="390" y="164" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">Actor</text>
  <text x="372" y="190" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">pi_theta(a|s)</text>
  <rect x="330" y="285" width="190" height="82" rx="8" fill="#ffffff" stroke="#f2994a" stroke-width="2"/>
  <text x="390" y="319" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">Critic</text>
  <text x="383" y="345" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">V_phi(s)</text>
  <rect x="630" y="195" width="180" height="78" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
  <text x="671" y="226" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">Advantage</text>
  <text x="685" y="252" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">A_t</text>
  <path d="M233 218 L330 171" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M233 250 L330 326" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M520 171 C585 170 600 205 630 222" stroke="#566070" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M520 326 C585 326 600 260 630 245" stroke="#566070" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="592" y="160" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">log prob</text>
  <text x="575" y="350" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">baseline</text>
  <rect x="250" y="420" width="400" height="42" rx="8" fill="#ffffff" stroke="#d4dbe5"/>
  <text x="292" y="447" font-family="Arial, sans-serif" font-size="17" fill="#222831">A_t tells whether action was better than expected</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
