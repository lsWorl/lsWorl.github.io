<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">训练误差与验证误差曲线</title>
  <desc id="desc">随着模型复杂度增加，训练误差下降，而验证误差先下降后上升。</desc>
  <defs>
    <style>
      .txt { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #243447; font-size: 16px; }
      .title { font-size: 22px; font-weight: 700; }
      .small { font-size: 13px; fill: #526173; }
      .axis { stroke: #8090a3; stroke-width: 2; }
      .train { stroke: #3f79b7; stroke-width: 4; fill: none; }
      .valid { stroke: #c44d63; stroke-width: 4; fill: none; }
      .dash { stroke: #526173; stroke-width: 2; stroke-dasharray: 6 6; }
      .band { fill: #eaf7ef; opacity: .75; }
    </style>
  </defs>
  <rect width="920" height="420" fill="#f7fafc"/>
  <text class="txt title" x="36" y="42">判断过拟合：不要只看训练误差</text>
  <text class="txt small" x="36" y="68">模型复杂度增加时，训练误差常常继续下降，但验证误差可能开始上升。</text>

  <line class="axis" x1="100" y1="340" x2="820" y2="340"/>
  <line class="axis" x1="100" y1="340" x2="100" y2="100"/>
  <text class="txt small" x="782" y="370">模型复杂度</text>
  <text class="txt small" x="62" y="108">误差</text>

  <rect class="band" x="368" y="104" width="150" height="236"/>
  <text class="txt small" x="388" y="120">较合适区域</text>

  <path class="train" d="M120 306 C210 260, 300 220, 420 180 C540 144, 670 122, 800 110"/>
  <path class="valid" d="M120 310 C220 240, 320 172, 430 150 C540 158, 650 216, 800 300"/>
  <line class="dash" x1="430" y1="340" x2="430" y2="150"/>

  <text class="txt" x="650" y="124" fill="#3f79b7">训练误差</text>
  <text class="txt" x="650" y="286" fill="#c44d63">验证误差</text>
  <text class="txt small" x="126" y="386">欠拟合</text>
  <text class="txt small" x="426" y="386">泛化较好</text>
  <text class="txt small" x="732" y="386">过拟合</text>
</svg>
