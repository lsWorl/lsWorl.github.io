<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Autograd computation graph</title>
  <desc id="desc">Autograd records tensor operations during the forward pass and applies the chain rule during backward pass.</desc>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Autograd Records Operations, Then Applies Chain Rule</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The graph is built dynamically while tensors flow through the model.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="95" y="205" width="105" height="66" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="148" y="245" font-size="19" font-weight="700" fill="#222831">x</text>
    <rect x="260" y="205" width="120" height="66" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
    <text x="320" y="245" font-size="19" font-weight="700" fill="#222831">Linear</text>
    <rect x="440" y="205" width="120" height="66" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
    <text x="500" y="245" font-size="19" font-weight="700" fill="#222831">ReLU</text>
    <rect x="620" y="205" width="120" height="66" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
    <text x="680" y="245" font-size="19" font-weight="700" fill="#222831">Loss</text>
  </g>
  <path d="M200 238 L260 238" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M380 238 L440 238" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M560 238 L620 238" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M680 271 C650 345 330 345 320 271" stroke="#eb5757" stroke-width="3" fill="none" marker-end="url(#redArrow)"/>
  <text x="412" y="365" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#c0392b">backward: compute gradients</text>
  <rect x="212" y="395" width="475" height="38" rx="8" fill="#ffffff" stroke="#d4dbe5"/>
  <text x="244" y="420" font-family="Arial, sans-serif" font-size="16" fill="#222831">loss.backward() fills parameter.grad; optimizer.step() updates parameters</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
    <marker id="redArrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#eb5757"/>
    </marker>
  </defs>
</svg>
