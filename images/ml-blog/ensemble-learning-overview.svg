<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">集成学习示意图</title>
  <desc id="desc">多个弱模型通过投票或平均得到最终预测。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#44546a"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; rx: 8; }
      .tree { fill: #e8f4ff; stroke: #3f79b7; stroke-width: 2; rx: 8; }
      .boost { fill: #fff4df; stroke: #d18a1f; stroke-width: 2; rx: 8; }
      .final { fill: #eaf7ef; stroke: #3f8f5f; stroke-width: 2; rx: 8; }
      .line { stroke: #44546a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .txt { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #243447; font-size: 18px; }
      .small { font-size: 15px; fill: #526173; }
      .label { font-size: 20px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="860" height="420"/>
  <text class="txt label" x="40" y="48">集成学习：让多个模型一起做决定</text>
  <text class="txt small" x="40" y="78">单个模型可能会犯错，但多个差异化模型组合后，预测通常更稳定。</text>

  <rect class="panel" x="38" y="118" width="190" height="230"/>
  <text class="txt label" x="72" y="154">训练数据</text>
  <text class="txt small" x="70" y="187">样本 + 特征 + 标签</text>
  <circle cx="84" cy="230" r="8" fill="#3f79b7"/>
  <circle cx="124" cy="230" r="8" fill="#d18a1f"/>
  <circle cx="164" cy="230" r="8" fill="#3f8f5f"/>
  <circle cx="104" cy="270" r="8" fill="#d18a1f"/>
  <circle cx="144" cy="270" r="8" fill="#3f79b7"/>
  <circle cx="184" cy="270" r="8" fill="#3f8f5f"/>

  <path class="line" d="M235 190 C270 155, 286 145, 322 145"/>
  <path class="line" d="M235 230 C270 230, 286 230, 322 230"/>
  <path class="line" d="M235 270 C270 305, 286 315, 322 315"/>

  <rect class="tree" x="322" y="112" width="170" height="66"/>
  <text class="txt" x="362" y="153">模型 A</text>
  <rect class="tree" x="322" y="197" width="170" height="66"/>
  <text class="txt" x="362" y="238">模型 B</text>
  <rect class="tree" x="322" y="282" width="170" height="66"/>
  <text class="txt" x="362" y="323">模型 C</text>

  <path class="line" d="M500 145 C540 160, 556 178, 588 202"/>
  <path class="line" d="M500 230 L588 230"/>
  <path class="line" d="M500 315 C540 300, 556 282, 588 258"/>

  <rect class="boost" x="590" y="186" width="150" height="88"/>
  <text class="txt" x="622" y="224">投票 / 平均</text>
  <text class="txt small" x="624" y="250">组合预测</text>

  <path class="line" d="M746 230 L796 230"/>
  <rect class="final" x="798" y="188" width="26" height="84"/>
  <text class="txt small" x="764" y="315">最终结果</text>
</svg>
