<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">GNN task types</title>
  <desc id="desc">GNNs can solve node-level, edge-level, and graph-level prediction tasks.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Three Common GNN Tasks</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Predictions can attach to nodes, edges, or entire graphs.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="145" width="220" height="245" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2"/>
    <text x="180" y="186" font-size="22" font-weight="700" fill="#222831">Node Level</text>
    <line x1="140" y1="245" x2="220" y2="245" stroke="#566070" stroke-width="3"/>
    <line x1="180" y1="215" x2="180" y2="310" stroke="#566070" stroke-width="3"/>
    <circle cx="180" cy="215" r="22" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <circle cx="140" cy="245" r="22" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <circle cx="220" cy="245" r="22" fill="#f0fff4" stroke="#27ae60" stroke-width="3"/>
    <circle cx="180" cy="310" r="24" fill="#fff0f0" stroke="#eb5757" stroke-width="4"/>
    <text x="180" y="356" font-size="16" fill="#5f6b7a">classify a node</text>
    <rect x="340" y="145" width="220" height="245" rx="8" fill="#ffffff" stroke="#f2994a" stroke-width="2"/>
    <text x="450" y="186" font-size="22" font-weight="700" fill="#222831">Edge Level</text>
    <line x1="405" y1="260" x2="495" y2="260" stroke="#eb5757" stroke-width="7"/>
    <circle cx="405" cy="260" r="26" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <circle cx="495" cy="260" r="26" fill="#f0fff4" stroke="#27ae60" stroke-width="3"/>
    <circle cx="450" cy="210" r="22" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <line x1="450" y1="232" x2="405" y2="260" stroke="#566070" stroke-width="3"/>
    <line x1="450" y1="232" x2="495" y2="260" stroke="#566070" stroke-width="3"/>
    <text x="450" y="356" font-size="16" fill="#5f6b7a">predict a link</text>
    <rect x="610" y="145" width="220" height="245" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
    <text x="720" y="186" font-size="22" font-weight="700" fill="#222831">Graph Level</text>
    <circle cx="690" cy="235" r="22" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <circle cx="750" cy="235" r="22" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <circle cx="720" cy="285" r="22" fill="#f0fff4" stroke="#27ae60" stroke-width="3"/>
    <line x1="690" y1="235" x2="750" y2="235" stroke="#566070" stroke-width="3"/>
    <line x1="690" y1="235" x2="720" y2="285" stroke="#566070" stroke-width="3"/>
    <line x1="750" y1="235" x2="720" y2="285" stroke="#566070" stroke-width="3"/>
    <rect x="670" y="320" width="100" height="35" rx="8" fill="#f7f3ff" stroke="#9b51e0"/>
    <text x="720" y="343" font-size="16" fill="#222831">label</text>
  </g>
</svg>
