<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">PPO clipped objective</title>
  <desc id="desc">PPO clips the probability ratio to discourage policy updates that are too large.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">The Clipped Objective Limits Policy Change</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The probability ratio is constrained around 1.</text>
  <line x1="120" y1="355" x2="790" y2="355" stroke="#c8d0da" stroke-width="2"/>
  <line x1="170" y1="110" x2="170" y2="390" stroke="#c8d0da" stroke-width="2"/>
  <path d="M170 330 L320 270 L450 220 L580 170 L730 115" stroke="#2f80ed" stroke-width="4" fill="none"/>
  <path d="M170 330 L320 270 L450 220 L580 220 L730 220" stroke="#eb5757" stroke-width="4" fill="none"/>
  <line x1="350" y1="112" x2="350" y2="365" stroke="#f2994a" stroke-width="3" stroke-dasharray="8 7"/>
  <line x1="580" y1="112" x2="580" y2="365" stroke="#f2994a" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="325" y="388" font-family="Arial, sans-serif" font-size="17" fill="#9b6500">1-eps</text>
  <text x="555" y="388" font-family="Arial, sans-serif" font-size="17" fill="#9b6500">1+eps</text>
  <text x="424" y="388" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">ratio r(theta)</text>
  <text x="620" y="176" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2f80ed">unclipped</text>
  <text x="620" y="244" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#eb5757">clipped</text>
  <rect x="165" y="420" width="570" height="42" rx="8" fill="#ffffff" stroke="#d4dbe5"/>
  <text x="207" y="447" font-family="Arial, sans-serif" font-size="17" fill="#222831">L = min(r A, clip(r, 1-eps, 1+eps) A)</text>
</svg>
