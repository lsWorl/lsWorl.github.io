<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">PPO training flow</title>
  <desc id="desc">PPO training collects rollouts, computes returns and advantages, optimizes minibatches for several epochs, then replaces the old policy.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">PPO Training Flow</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">The same rollout data can be reused for several minibatch updates.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="55" y="205" width="145" height="78" rx="8" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="128" y="235" font-size="18" font-weight="700" fill="#222831">Rollout</text>
    <text x="128" y="260" font-size="15" fill="#5f6b7a">collect data</text>
    <rect x="250" y="205" width="145" height="78" rx="8" fill="#fff8e8" stroke="#f2994a" stroke-width="2"/>
    <text x="323" y="235" font-size="18" font-weight="700" fill="#222831">Advantage</text>
    <text x="323" y="260" font-size="15" fill="#5f6b7a">GAE / returns</text>
    <rect x="445" y="205" width="145" height="78" rx="8" fill="#f7f3ff" stroke="#9b51e0" stroke-width="2"/>
    <text x="518" y="235" font-size="18" font-weight="700" fill="#222831">Minibatch</text>
    <text x="518" y="260" font-size="15" fill="#5f6b7a">several epochs</text>
    <rect x="640" y="205" width="190" height="78" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
    <text x="735" y="235" font-size="18" font-weight="700" fill="#222831">Update Networks</text>
    <text x="735" y="260" font-size="15" fill="#5f6b7a">actor + critic</text>
  </g>
  <path d="M200 244 L250 244" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M395 244 L445 244" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M590 244 L640 244" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M735 283 C710 390 150 390 128 283" stroke="#566070" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="368" y="410" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#566070">replace old policy and repeat</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
