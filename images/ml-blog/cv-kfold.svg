<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">K-fold cross validation</title>
  <desc id="desc">A five-fold cross validation diagram showing each fold used once as validation data.</desc>
  <rect width="920" height="440" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #334155; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; fill: #64748b; }
  </style>
  <text x="330" y="42" class="title">5 折交叉验证</text>
  <text x="84" y="82" class="small">每一轮换一份数据做验证集，其余数据用于训练</text>
  <g transform="translate(110 110)">
    <g class="row">
      <text x="-70" y="28" class="label">第 1 轮</text>
      <rect x="0" y="0" width="120" height="44" rx="6" fill="#f97316"/><text x="34" y="28" fill="#fff" font-weight="700">验证</text>
      <rect x="128" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="256" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="384" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="512" y="0" width="120" height="44" rx="6" fill="#dbeafe"/>
    </g>
    <g transform="translate(0 58)">
      <text x="-70" y="28" class="label">第 2 轮</text>
      <rect x="0" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="128" y="0" width="120" height="44" rx="6" fill="#f97316"/><text x="162" y="28" fill="#fff" font-weight="700">验证</text><rect x="256" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="384" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="512" y="0" width="120" height="44" rx="6" fill="#dbeafe"/>
    </g>
    <g transform="translate(0 116)">
      <text x="-70" y="28" class="label">第 3 轮</text>
      <rect x="0" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="128" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="256" y="0" width="120" height="44" rx="6" fill="#f97316"/><text x="290" y="28" fill="#fff" font-weight="700">验证</text><rect x="384" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="512" y="0" width="120" height="44" rx="6" fill="#dbeafe"/>
    </g>
    <g transform="translate(0 174)">
      <text x="-70" y="28" class="label">第 4 轮</text>
      <rect x="0" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="128" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="256" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="384" y="0" width="120" height="44" rx="6" fill="#f97316"/><text x="418" y="28" fill="#fff" font-weight="700">验证</text><rect x="512" y="0" width="120" height="44" rx="6" fill="#dbeafe"/>
    </g>
    <g transform="translate(0 232)">
      <text x="-70" y="28" class="label">第 5 轮</text>
      <rect x="0" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="128" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="256" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="384" y="0" width="120" height="44" rx="6" fill="#dbeafe"/><rect x="512" y="0" width="120" height="44" rx="6" fill="#f97316"/><text x="546" y="28" fill="#fff" font-weight="700">验证</text>
    </g>
  </g>
  <rect x="750" y="330" width="150" height="44" rx="6" fill="#dbeafe"/>
  <text x="810" y="358" class="label">训练</text>
  <rect x="750" y="382" width="150" height="44" rx="6" fill="#f97316"/>
  <text x="810" y="410" fill="#fff" font-weight="700">验证</text>
</svg>
