<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">Grid search hyperparameter combinations</title>
  <desc id="desc">A grid search diagram showing candidate hyperparameter combinations and choosing the best cross validation score.</desc>
  <rect width="920" height="460" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #334155; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; fill: #64748b; }
  </style>
  <text x="326" y="42" class="title">网格搜索：遍历参数组合</text>
  <text x="90" y="84" class="small">每一个格子代表一组超参数，对每一组都做交叉验证，再比较平均分</text>
  <g transform="translate(130 120)">
    <text x="180" y="-16" class="label">n_neighbors</text>
    <text x="42" y="28" class="label">3</text>
    <text x="142" y="28" class="label">5</text>
    <text x="242" y="28" class="label">7</text>
    <text x="342" y="28" class="label">9</text>
    <text x="-92" y="92" class="label">uniform</text>
    <text x="-92" y="192" class="label">distance</text>
    <g>
      <rect x="0" y="50" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="100" y="50" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="200" y="50" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="300" y="50" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="0" y="150" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="100" y="150" width="82" height="82" rx="8" fill="#ecfdf5" stroke="#14b8a6" stroke-width="4"/>
      <rect x="200" y="150" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="300" y="150" width="82" height="82" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
    </g>
    <text x="26" y="98" class="small">0.90</text>
    <text x="126" y="98" class="small">0.92</text>
    <text x="226" y="98" class="small">0.91</text>
    <text x="326" y="98" class="small">0.89</text>
    <text x="26" y="198" class="small">0.91</text>
    <text x="124" y="198" class="label" fill="#0f766e">0.94</text>
    <text x="226" y="198" class="small">0.93</text>
    <text x="326" y="198" class="small">0.90</text>
  </g>
  <path d="M548 236H675" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="690" y="168" width="170" height="130" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="724" y="205" class="label">最佳组合</text>
  <text x="714" y="238" class="small">n_neighbors = 5</text>
  <text x="714" y="264" class="small">weights = distance</text>
  <text x="714" y="290" class="small">CV score = 0.94</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
