<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">HEFT DAG scheduling problem</title>
  <desc id="desc">A directed acyclic graph of dependent tasks is mapped to heterogeneous processors.</desc>
  <rect width="900" height="470" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">HEFT Schedules a Task DAG on Heterogeneous Processors</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Tasks have dependencies, processors have different execution speeds, and edges may introduce communication cost.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="150" cy="210" r="36" fill="#eaf3ff" stroke="#2f80ed" stroke-width="3"/>
    <text x="150" y="218" font-size="20" font-weight="700" fill="#222831">T1</text>
    <circle cx="320" cy="150" r="36" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <text x="320" y="158" font-size="20" font-weight="700" fill="#222831">T2</text>
    <circle cx="320" cy="275" r="36" fill="#fff8e8" stroke="#f2994a" stroke-width="3"/>
    <text x="320" y="283" font-size="20" font-weight="700" fill="#222831">T3</text>
    <circle cx="500" cy="210" r="36" fill="#f7f3ff" stroke="#9b51e0" stroke-width="3"/>
    <text x="500" y="218" font-size="20" font-weight="700" fill="#222831">T4</text>
  </g>
  <path d="M186 197 L285 163" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M186 224 L285 262" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M356 162 L465 197" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M356 263 L465 224" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="235" y="164" font-family="Arial, sans-serif" font-size="15" fill="#5f6b7a">data</text>
  <text x="235" y="263" font-family="Arial, sans-serif" font-size="15" fill="#5f6b7a">data</text>
  <rect x="640" y="135" width="190" height="72" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
  <text x="682" y="166" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#222831">CPU</text>
  <text x="672" y="190" font-family="Arial, sans-serif" font-size="15" fill="#5f6b7a">fast for control tasks</text>
  <rect x="640" y="245" width="190" height="72" rx="8" fill="#ffffff" stroke="#eb5757" stroke-width="2"/>
  <text x="682" y="276" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#222831">GPU</text>
  <text x="668" y="300" font-family="Arial, sans-serif" font-size="15" fill="#5f6b7a">fast for numeric tasks</text>
  <path d="M536 210 C585 190 600 174 640 171" stroke="#566070" stroke-width="3" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <path d="M536 232 C585 266 600 280 640 281" stroke="#566070" stroke-width="3" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#566070"/>
    </marker>
  </defs>
</svg>
