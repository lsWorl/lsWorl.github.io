<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Earliest finish time in HEFT</title>
  <desc id="desc">A task is assigned to the processor that gives the earliest finish time after considering processor availability, parent data arrival, and computation cost.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Processor Selection: Earliest Finish Time</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">For each ready task, HEFT tries every processor and picks the smallest EFT.</text>
  <g font-family="Arial, sans-serif">
    <text x="92" y="178" font-size="19" font-weight="700" fill="#222831">P1</text>
    <rect x="150" y="145" width="150" height="48" rx="6" fill="#dbeafe" stroke="#2f80ed"/>
    <text x="198" y="176" font-size="16" fill="#222831">busy</text>
    <rect x="315" y="145" width="140" height="48" rx="6" fill="#fff8e8" stroke="#f2994a"/>
    <text x="350" y="176" font-size="16" fill="#222831">new task</text>
    <text x="480" y="176" font-size="18" font-weight="700" fill="#27ae60">EFT = 12</text>
    <text x="92" y="278" font-size="19" font-weight="700" fill="#222831">P2</text>
    <rect x="150" y="245" width="95" height="48" rx="6" fill="#dbeafe" stroke="#2f80ed"/>
    <text x="174" y="276" font-size="16" fill="#222831">busy</text>
    <rect x="260" y="245" width="175" height="48" rx="6" fill="#fff8e8" stroke="#f2994a"/>
    <text x="312" y="276" font-size="16" fill="#222831">new task</text>
    <text x="480" y="276" font-size="18" font-weight="700" fill="#eb5757">EFT = 14</text>
    <line x1="145" y1="335" x2="600" y2="335" stroke="#c8d0da" stroke-width="2"/>
    <text x="145" y="365" font-size="15" fill="#5f6b7a">time 0</text>
    <text x="300" y="365" font-size="15" fill="#5f6b7a">ready</text>
    <text x="445" y="365" font-size="15" fill="#5f6b7a">finish</text>
  </g>
  <rect x="640" y="155" width="200" height="165" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
  <text x="675" y="200" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222831">Choose P1</text>
  <text x="675" y="240" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">because 12 &lt; 14</text>
  <text x="675" y="270" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">even if P1 was busy</text>
</svg>
