<svg xmlns="http://www.w3.org/2000/svg" width="980" height="660" viewBox="0 0 980 660" role="img" aria-labelledby="title desc">
  <title id="title">深度学习学习路线</title>
  <desc id="desc">展示深度学习入门之后的推荐学习流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5f73"/>
    </marker>
  </defs>
  <rect width="980" height="660" rx="20" fill="#f7fbfc"/>
  <text x="490" y="52" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#17323c">深度学习后续学习流程</text>
  <text x="490" y="86" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" fill="#55717b">按“基础概念 -> 代码实现 -> 经典结构 -> 项目实践 -> 论文复现”的节奏推进</text>

  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <rect x="90" y="126" width="800" height="64" rx="14" fill="#e8f4f7" stroke="#9dccd7" stroke-width="2"/>
    <text x="128" y="166" font-size="20" font-weight="700" fill="#17323c">1. 数学与机器学习基础</text>
    <text x="440" y="166" font-size="15" fill="#55717b">线性代数、概率、导数、梯度下降、过拟合</text>

    <rect x="90" y="218" width="800" height="64" rx="14" fill="#ffffff" stroke="#f0c894" stroke-width="2"/>
    <text x="128" y="258" font-size="20" font-weight="700" fill="#17323c">2. 神经网络基础</text>
    <text x="440" y="258" font-size="15" fill="#55717b">感知机、MLP、激活函数、损失函数、反向传播</text>

    <rect x="90" y="310" width="800" height="64" rx="14" fill="#edf8ee" stroke="#aed6b3" stroke-width="2"/>
    <text x="128" y="350" font-size="20" font-weight="700" fill="#17323c">3. PyTorch 实战</text>
    <text x="440" y="350" font-size="15" fill="#55717b">Tensor、nn.Module、Dataset、DataLoader、训练循环</text>

    <rect x="90" y="402" width="800" height="64" rx="14" fill="#fff4e9" stroke="#f0c894" stroke-width="2"/>
    <text x="128" y="442" font-size="20" font-weight="700" fill="#17323c">4. 经典模型结构</text>
    <text x="440" y="442" font-size="15" fill="#55717b">CNN、RNN、LSTM、Transformer、GNN、AutoEncoder</text>

    <rect x="90" y="494" width="800" height="64" rx="14" fill="#f4effb" stroke="#d2c1eb" stroke-width="2"/>
    <text x="128" y="534" font-size="20" font-weight="700" fill="#17323c">5. 项目与论文</text>
    <text x="440" y="534" font-size="15" fill="#55717b">图像分类、文本分类、推荐系统、模型部署、论文复现</text>
  </g>

  <path d="M490 190 V209" stroke="#2f5f73" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 282 V301" stroke="#2f5f73" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 374 V393" stroke="#2f5f73" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 466 V485" stroke="#2f5f73" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="490" y="618" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" fill="#55717b">建议每学一个模型都完成三件事：手算一个小例子、写一个 PyTorch 版本、跑一个小数据集</text>
</svg>
