<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">RL algorithms around MDP</title>
  <desc id="desc">Different reinforcement learning algorithms solve an MDP by using known models, sampled returns, bootstrapping, action values, or direct policy optimization.</desc>
  <rect width="900" height="500" fill="#fbfbfd"/>
  <text x="52" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222831">Algorithms Built on the MDP Frame</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="17" fill="#5f6b7a">Different methods answer the same question with different information.</text>
  <circle cx="450" cy="255" r="88" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
  <text x="408" y="248" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#222831">MDP</text>
  <text x="387" y="280" font-family="Arial, sans-serif" font-size="16" fill="#5f6b7a">S, A, P, R, gamma</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="95" y="150" width="170" height="66" rx="8" fill="#eaf3ff" stroke="#2f80ed"/>
    <text x="180" y="188" font-size="18" font-weight="700" fill="#222831">Dynamic Programming</text>
    <rect x="95" y="315" width="170" height="66" rx="8" fill="#fff8e8" stroke="#f2994a"/>
    <text x="180" y="353" font-size="18" font-weight="700" fill="#222831">Monte Carlo</text>
    <rect x="365" y="390" width="170" height="66" rx="8" fill="#f7f3ff" stroke="#9b51e0"/>
    <text x="450" y="428" font-size="18" font-weight="700" fill="#222831">TD Learning</text>
    <rect x="635" y="315" width="170" height="66" rx="8" fill="#f0fff4" stroke="#27ae60"/>
    <text x="720" y="353" font-size="18" font-weight="700" fill="#222831">Q-Learning / SARSA</text>
    <rect x="635" y="150" width="170" height="66" rx="8" fill="#fff0f0" stroke="#eb5757"/>
    <text x="720" y="188" font-size="18" font-weight="700" fill="#222831">Policy Gradient</text>
  </g>
  <path d="M265 183 L370 222" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M265 348 L370 288" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M450 390 L450 343" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M635 348 L530 288" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M635 183 L530 222" stroke="#566070" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#566070"/></marker>
  </defs>
</svg>
